[defaults]
# Disable SSH host key checking (useful in containers and CI/CD)
host_key_checking = False

# Use SSH for connections (instead of paramiko)
transport = ssh

# Timeout for SSH connections
timeout = 10

# Gather facts in parallel
forks = 5

# Show skipped tasks
display_skipped_hosts = True

# Callback plugin for better output
stdout_callback = yaml

# Enable retry files to be written to /dev/null (no clutter)
retry_files_enabled = False

[ssh_connection]
# SSH arguments
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
